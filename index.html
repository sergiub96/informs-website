<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Documentații complete, formulare și instrumente de lucru inteligente, într-un format intuitiv, standard și ușor de utilizat." />
  <meta property="og:title" content="INFORMS - Formulare inteligente. Documentații complete." />
  <meta property="og:description" content="Soluții adaptate pentru achiziții publice, delegare servicii de utilități publice, management de proiect și digitalizare." />
  <title>INFORMS - Formulare inteligente. Documentații complete.</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="uploads/informs-website-favicon-color-removebg-preview-removebg-preview.png" />

  <!-- Preconnect pentru resurse externe critice -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

  <!-- CSS critic — inline pentru a evita render blocking -->
  <link rel="preload" href="main.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="main.css" /></noscript>

  <!-- Google Fonts — async, fără render blocking -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" /></noscript>

  <!-- Cookie Consent CSS — async -->
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/vanilla-cookieconsent@3.0.1/dist/cookieconsent.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vanilla-cookieconsent@3.0.1/dist/cookieconsent.css" /></noscript>

  <!-- React self-hosted — defer elimină render blocking -->
  <script defer src="vendor/react.production.min.js"></script>
  <script defer src="vendor/react-dom.production.min.js"></script>

  <!-- Aplicație — defer, se execută în ordine după parsarea HTML -->
  <script defer src="Layout.js"></script>
  <script defer src="Icons.js"></script>
  <script defer src="Home.js"></script>
  <script defer src="Pages.js"></script>
  <script defer src="Shop.js"></script>
  <script defer src="App.js"></script>

  <!-- Google Analytics — încărcat după load, nu blochează LCP -->
  <script>
    window.addEventListener('load', function() {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-G2RJ4GKPJ1';
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-G2RJ4GKPJ1');
    });
  </script>

  <!-- Stil cookie bar aliniat cu tema site-ului -->
  <style>
    :root {
      --cc-bg: #061830;
      --cc-primary-color: #fff;
      --cc-secondary-color: rgba(255,255,255,.65);
      --cc-btn-primary-bg: #3B80CA;
      --cc-btn-primary-color: #fff;
      --cc-btn-primary-hover-bg: #5294D4;
      --cc-btn-secondary-bg: transparent;
      --cc-btn-secondary-color: rgba(255,255,255,.75);
      --cc-btn-secondary-border-color: rgba(255,255,255,.3);
      --cc-btn-secondary-hover-bg: rgba(255,255,255,.08);
      --cc-btn-secondary-hover-color: #fff;
      --cc-separator-border-color: rgba(255,255,255,.1);
      --cc-toggle-on-bg: #3B80CA;
      --cc-toggle-off-bg: rgba(255,255,255,.25);
      --cc-toggle-readonly-bg: rgba(255,255,255,.15);
      --cc-cookie-category-block-bg: rgba(255,255,255,.04);
      --cc-cookie-category-block-border: rgba(255,255,255,.08);
      --cc-modal-border-radius: 12px;
      --cc-btn-border-radius: 6px;
      --cc-font-family: 'Inter', system-ui, sans-serif;
    }
    #cc-main .cm {
      box-shadow: 0 -4px 32px rgba(0,0,0,.25);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Cookie Consent init — module este auto-deferred -->
  <script type="module">
    import 'https://cdn.jsdelivr.net/npm/vanilla-cookieconsent@3.0.1/dist/cookieconsent.esm.js';

    CookieConsent.run({
      guiOptions: {
        consentModal: {
          layout: 'bar',
          position: 'bottom',
          equalWeightButtons: false,
          flipButtons: false,
        },
        preferencesModal: {
          layout: 'box',
          equalWeightButtons: true,
        },
      },
      categories: {
        necessary: { enabled: true, readOnly: true },
        analytics: { enabled: false },
      },
      language: {
        default: 'ro',
        translations: {
          ro: {
            consentModal: {
              title: 'Folosim cookie-uri',
              description: 'Utilizăm cookie-uri necesare pentru funcționarea site-ului și, opțional, cookie-uri de analiză (Google Analytics) pentru a înțelege cum este utilizat site-ul. Datele de analiză sunt anonimizate.',
              acceptAllBtn: 'Acceptă toate',
              acceptNecessaryBtn: 'Doar necesare',
              showPreferencesBtn: 'Setări',
              footer: '<a href="#politica-confidentialitate">Politica de confidențialitate</a> · <a href="#termeni-si-conditii">Termeni și condiții</a>',
            },
            preferencesModal: {
              title: 'Preferințe cookie-uri',
              acceptAllBtn: 'Acceptă toate',
              acceptNecessaryBtn: 'Doar necesare',
              savePreferencesBtn: 'Salvează preferințele',
              closeIconLabel: 'Închide',
              sections: [
                {
                  title: 'Cookie-uri necesare',
                  description: 'Aceste cookie-uri sunt esențiale pentru funcționarea corectă a site-ului și nu pot fi dezactivate.',
                  linkedCategory: 'necessary',
                },
                {
                  title: 'Cookie-uri de analiză',
                  description: 'Utilizăm Google Analytics pentru a înțelege cum este utilizat site-ul (pagini vizitate, durata sesiunii, dispozitiv). Datele sunt anonimizate și nu sunt partajate cu terți în scop comercial.',
                  linkedCategory: 'analytics',
                },
              ],
            },
          },
        },
      },
    });
  </script>
</body>
</html>
