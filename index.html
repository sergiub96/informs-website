  <!-- Smooth slow scroll (desktop only) -->
  <script>
  (function() {
    if ('ontouchstart' in window) return;
    var cur = window.scrollY, tgt = window.scrollY, raf = null;
    function tick() {
      var d = tgt - cur;
      if (Math.abs(d) < 0.5) { window.scrollTo(0, tgt); raf = null; return; }
      cur += d * 0.076;
      window.scrollTo(0, Math.round(cur));
      raf = requestAnimationFrame(tick);
    }
    window.addEventListener('wheel', function(e) {
      var el = e.target;
      while (el && el !== document.body) {
        var s = getComputedStyle(el);
        if (/auto|scroll/.test(s.overflow + s.overflowY) && el.scrollHeight > el.clientHeight + 2) return;
        el = el.parentElement;
      }
      e.preventDefault();
      var max = document.documentElement.scrollHeight - window.innerHeight;
      tgt = Math.max(0, Math.min(max, tgt + e.deltaY));
      cur = window.scrollY;
      if (!raf) raf = requestAnimationFrame(tick);
    }, { passive: false });
    window.addEventListener('scroll', function() { if (!raf) { cur = window.scrollY; tgt = window.scrollY; } }, { passive: true });
  })();
  </script>
