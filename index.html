  <!-- Cookie Consent init -->
  <script type="module">
    import 'https://cdn.jsdelivr.net/npm/vanilla-cookieconsent@3.0.1/dist/cookieconsent.esm.js';

    CookieConsent.run({
      guiOptions: {
        consentModal: {
          layout: 'bar',
          position: 'bottom',
          equalWeightButtons: false,
          flipButtons: false,
        },
        preferencesModal: {
          layout: 'box',
          equalWeightButtons: true,
        },
      },

      categories: {
        necessary: {
          enabled: true,
          readOnly: true,
        },
        analytics: {
          enabled: false,
        },
      },

      language: {
        default: 'ro',
        translations: {
          ro: {
            consentModal: {
              title: 'Folosim cookie-uri',
              description:
                'Utilizăm cookie-uri necesare pentru funcționarea site-ului și, opțional, cookie-uri de analiză (Google Analytics) pentru a înțelege cum este utilizat site-ul. Datele de analiză sunt anonimizate.',
              acceptAllBtn: 'Acceptă toate',
              acceptNecessaryBtn: 'Doar necesare',
              showPreferencesBtn: 'Setări',
              footer:
                '<a href="#politica-confidentialitate">Politica de confidențialitate</a> · <a href="#termeni-si-conditii">Termeni și condiții</a>',
            },
            preferencesModal: {
              title: 'Preferințe cookie-uri',
              acceptAllBtn: 'Acceptă toate',
              acceptNecessaryBtn: 'Doar necesare',
              savePreferencesBtn: 'Salvează preferințele',
              closeIconLabel: 'Închide',
              sections: [
                {
                  title: 'Cookie-uri necesare',
                  description:
                    'Aceste cookie-uri sunt esențiale pentru funcționarea corectă a site-ului și nu pot fi dezactivate.',
                  linkedCategory: 'necessary',
                },
                {
                  title: 'Cookie-uri de analiză',
                  description:
                    'Utilizăm Google Analytics pentru a înțelege cum este utilizat site-ul (pagini vizitate, durata sesiunii, dispozitiv). Datele sunt anonimizate și nu sunt partajate cu terți în scop comercial.',
                  linkedCategory: 'analytics',
                },
              ],
            },
          },
        },
      },
    });
  </script>

  <style>

    :root {

      --cc-cookie-category-block-border: rgba(255,255,255,.08);
      --cc-modal-border-radius: 12px;
      --cc-btn-border-radius: 6px;
      --cc-font-family: 'Inter', system-ui, sans-serif;
    }
    #cc-main .cm {
      box-shadow: 0 -4px 32px rgba(0,0,0,.25);
